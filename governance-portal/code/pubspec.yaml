name: governance_portal
description: Trust Registry Admin Web Dashboard - Clean Architecture with DIDComm
version: 2.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  path: ^1.9.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_static: ^1.1.3
  ssi: ^2.12.4
  uuid: ^4.5.1
  dotenv: ^4.2.0
  mime: ^2.0.0
  bip39_mnemonic: ^4.0.1
  http: ^1.5.0
  redis: ^4.0.0
  json_annotation: ^4.9.0
  didcomm: ^2.0.3
  meeting_place_core: ^0.0.1-dev.2
  meeting_place_mediator: ^0.0.1-dev.2
  meeting_place_control_plane: ^0.0.1-dev.2
  affinidi_tdk_vdip: ^1.0.0-dev.1
  affinidi_tdk_didcomm_mediator_client: ^1.0.0-dev.1
  # State Management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Routing
  go_router: ^14.7.0
  
  # DIDComm & Affinidi TDK
  intl: ^0.19.0
  google_fonts: ^6.1.0
  url_launcher: ^6.3.1
  logger: ^2.4.0
  
  # Storage
  shared_preferences: ^2.3.3
  flutter_dotenv: ^5.2.1
  flutter_hooks: ^0.21.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13

dependency_overrides:
  meta: 1.17.0

flutter:
  uses-material-design: true
  assets:
    # - .env
    - assets/
    - assets/images/
    - assets/images/start-background.png
    
