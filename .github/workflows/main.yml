name: Code Quality Checks

on:
  push:
    branches:
      - "**"
      - "!main"
  pull_request:
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  security:
    permissions:
      contents: read
      checks: read
      statuses: read
      security-events: write
    uses: affinidi/pipeline-security/.github/workflows/security-scanners.yml@main
    with:
      config-path: .github/labeler.yml
    secrets: inherit

  # Dart projects: university-issuance-service, verifier-portal/backend
  dart-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - university-issuance-service/code
          - verifier-portal/code/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Get dependencies
        working-directory: ${{ matrix.project }}
        run: dart pub get

      - name: Verify formatting
        working-directory: ${{ matrix.project }}
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        working-directory: ${{ matrix.project }}
        run: dart analyze --fatal-infos

      - name: Run tests
        working-directory: ${{ matrix.project }}
        run: dart test || echo "No tests found"

  # Flutter projects: student-vault-app, governance-portal, verifier-portal/frontend
  flutter-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - student-vault-app/code
          - governance-portal/code
          - verifier-portal/code/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: "stable"

      - name: Get dependencies
        working-directory: ${{ matrix.project }}
        run: flutter pub get

      - name: Verify formatting
        working-directory: ${{ matrix.project }}
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        working-directory: ${{ matrix.project }}
        run: flutter analyze

      - name: Run tests
        working-directory: ${{ matrix.project }}
        run: flutter test || echo "No tests found"

  # Shell script validation
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          ignore_paths: "node_modules vendor"
          severity: warning
