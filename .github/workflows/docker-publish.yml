name: Build & Publish Docker Images

on:
  push:
    branches: ["**"]
    paths:
      - "university-issuance-service/code/**"
      - "education-ministries-did-hosting/code/**"
      - "trust-registry/**"
      - "governance-portal/code/**"
      - "governance-portal/rust-did-generation-helper/**"
      - "verifier-portal/code/**"
      - ".github/workflows/docker-publish.yml"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  packages: write

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: etn-university-issuer
            context: university-issuance-service/code
            dockerfile: university-issuance-service/code/Dockerfile

          - image: etn-edu-ministries
            context: education-ministries-did-hosting/code
            dockerfile: education-ministries-did-hosting/code/Dockerfile

          - image: etn-trust-registry
            context: trust-registry
            dockerfile: trust-registry/Dockerfile.trust-registry
            needs_trust_registry_rs: true

          - image: etn-governance-portal
            context: governance-portal/code
            dockerfile: governance-portal/code/Dockerfile

          - image: etn-verifier-backend
            context: verifier-portal/code/backend
            dockerfile: verifier-portal/code/backend/Dockerfile

          - image: etn-verifier-frontend
            context: verifier-portal/code/frontend
            dockerfile: verifier-portal/code/frontend/Dockerfile

          - image: etn-did-gen
            context: governance-portal/rust-did-generation-helper
            dockerfile: governance-portal/rust-did-generation-helper/Dockerfile

          - image: etn-tr-did-gen
            context: trust-registry/affinidi-trust-registry-rs
            dockerfile: trust-registry/Dockerfile.did-gen
            needs_trust_registry_rs: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone affinidi-trust-registry-rs
        if: matrix.needs_trust_registry_rs
        run: |
          git clone https://github.com/affinidi/affinidi-trust-registry-rs.git trust-registry/affinidi-trust-registry-rs
          cd trust-registry/affinidi-trust-registry-rs && git checkout 2c87c33

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize branch name for Docker tag
        id: meta
        run: |
          branch_tag=$(echo '${{ github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "branch_tag=${branch_tag}" >> "$GITHUB_OUTPUT"
          # Build tag list: always latest + branch; add :main explicitly on main
          tags="ghcr.io/affinidi/${{ matrix.image }}:latest"
          tags="${tags},ghcr.io/affinidi/${{ matrix.image }}:${branch_tag}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            tags="${tags},ghcr.io/affinidi/${{ matrix.image }}:main"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Pull and retag for local save (amd64 for CI artifact)
        run: |
          docker pull --platform linux/amd64 ghcr.io/affinidi/${{ matrix.image }}:latest
          docker tag ghcr.io/affinidi/${{ matrix.image }}:latest ${{ matrix.image }}:latest

      - name: Save image tarball
        run: docker save ${{ matrix.image }}:latest | gzip > ${{ matrix.image }}.tar.gz

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image }}
          path: ${{ matrix.image }}.tar.gz
          retention-days: 90
