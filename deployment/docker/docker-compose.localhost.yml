# Education Trust Network - All-Docker Unified Compose
# All services run in Docker, ngrok stays on the host
# Generated configs come from: deployment/scripts/setup_ngrok.sh

services:
  # ════════════════════════════════════════════════════════
  # UNIVERSITY ISSUANCE SERVICES
  # ════════════════════════════════════════════════════════

  hk-university-issuer:
    build:
      context: ../../university-issuance-service/code
      dockerfile: Dockerfile
    container_name: hk-university-issuer
    labels:
      etn.group: "1-universities"
      etn.role: "HK University Issuer"
    ports:
      - "3000:3000"
    env_file:
      - ../../university-issuance-service/instances/hk-university/.env.ngrok
    volumes:
      - ../../university-issuance-service/instances/hk-university/data:/app/data
      - ../../university-issuance-service/instances/hk-university/keys:/app/keys
    restart: unless-stopped
    networks:
      - education-trust-network

  macau-university-issuer:
    build:
      context: ../../university-issuance-service/code
      dockerfile: Dockerfile
    container_name: macau-university-issuer
    labels:
      etn.group: "1-universities"
      etn.role: "Macau University Issuer"
    ports:
      - "3001:3001"
    env_file:
      - ../../university-issuance-service/instances/macau-university/.env.ngrok
    volumes:
      - ../../university-issuance-service/instances/macau-university/data:/app/data
      - ../../university-issuance-service/instances/macau-university/keys:/app/keys
    restart: unless-stopped
    networks:
      - education-trust-network

  # ════════════════════════════════════════════════════════
  # EDUCATION MINISTRIES DID HOSTING
  # ════════════════════════════════════════════════════════

  education-ministries:
    build:
      context: ../../education-ministries-did-hosting/code
      dockerfile: Dockerfile
    container_name: education-ministries-did-hosting
    labels:
      etn.group: "2-education-ministries"
      etn.role: "Education Ministries DID Hosting"
    ports:
      - "3100:3100"
    env_file:
      - ../../education-ministries-did-hosting/instance/.env.ngrok
    volumes:
      - ../../education-ministries-did-hosting/instance/data:/app/data
    restart: unless-stopped
    networks:
      - education-trust-network

  # ════════════════════════════════════════════════════════
  # TRUST REGISTRIES (HK, Macau, Singapore)
  # ════════════════════════════════════════════════════════

  trust-registry-hk:
    build:
      context: ../../trust-registry
      dockerfile: Dockerfile.trust-registry
    image: trust-registry:local
    container_name: trust-registry-hk
    labels:
      etn.group: "3-trust-registries"
      etn.role: "Trust Registry (Hong Kong)"
    ports:
      - "3232:3232"
    env_file:
      - ../../trust-registry/hk/docker.env
    volumes:
      - ../../trust-registry/hk/data:/data
    restart: unless-stopped
    networks:
      - education-trust-network

  trust-registry-macau:
    build:
      context: ../../trust-registry
      dockerfile: Dockerfile.trust-registry
    image: trust-registry:local
    container_name: trust-registry-macau
    labels:
      etn.group: "3-trust-registries"
      etn.role: "Trust Registry (Macau)"
    ports:
      - "3233:3232"
    env_file:
      - ../../trust-registry/macau/docker.env
    volumes:
      - ../../trust-registry/macau/data:/data
    restart: unless-stopped
    networks:
      - education-trust-network

  trust-registry-sg:
    build:
      context: ../../trust-registry
      dockerfile: Dockerfile.trust-registry
    image: trust-registry:local
    container_name: trust-registry-sg
    labels:
      etn.group: "3-trust-registries"
      etn.role: "Trust Registry (Singapore)"
    ports:
      - "3234:3232"
    env_file:
      - ../../trust-registry/sg/docker.env
    volumes:
      - ../../trust-registry/sg/data:/data
    restart: unless-stopped
    networks:
      - education-trust-network

  # ════════════════════════════════════════════════════════
  # GOVERNANCE PORTALS (HK, Macau, Singapore)
  # ════════════════════════════════════════════════════════

  hk-governance-portal:
    build:
      context: ../../governance-portal/code
      dockerfile: Dockerfile
      args:
        INSTANCE_ID: hk
        INSTANCE_PORT: "8050"
    container_name: hk-governance-portal
    labels:
      etn.group: "4-governance-portals"
      etn.role: "Governance Portal (Hong Kong)"
    ports:
      - "8050:8050"
    restart: unless-stopped
    networks:
      - education-trust-network

  macau-governance-portal:
    build:
      context: ../../governance-portal/code
      dockerfile: Dockerfile
      args:
        INSTANCE_ID: macau
        INSTANCE_PORT: "8051"
    container_name: macau-governance-portal
    labels:
      etn.group: "4-governance-portals"
      etn.role: "Governance Portal (Macau)"
    ports:
      - "8051:8051"
    restart: unless-stopped
    networks:
      - education-trust-network

  sg-governance-portal:
    build:
      context: ../../governance-portal/code
      dockerfile: Dockerfile
      args:
        INSTANCE_ID: sg
        INSTANCE_PORT: "8052"
    container_name: sg-governance-portal
    labels:
      etn.group: "4-governance-portals"
      etn.role: "Governance Portal (Singapore)"
    ports:
      - "8052:8052"
    restart: unless-stopped
    networks:
      - education-trust-network

  # ════════════════════════════════════════════════════════
  # VERIFIER PORTAL (Nova Corp)
  # ════════════════════════════════════════════════════════

  nova-verifier-backend:
    build:
      context: ../../verifier-portal/code/backend
      dockerfile: Dockerfile
    container_name: nova-verifier-backend
    labels:
      etn.group: "5-verifier-portal"
      etn.role: "Verifier Backend (Nova Corp)"
    ports:
      - "4001:4001"
    env_file:
      - ../../verifier-portal/code/backend/.env.ngrok
    volumes:
      - verifier-backend-data:/app/data
      - verifier-backend-keys:/app/keys
    restart: unless-stopped
    networks:
      - education-trust-network

  nova-verifier-frontend:
    build:
      context: ../../verifier-portal/code/frontend
      dockerfile: Dockerfile
    container_name: nova-verifier-frontend
    labels:
      etn.group: "5-verifier-portal"
      etn.role: "Verifier Frontend (Nova Corp)"
    ports:
      - "4000:4000"
    depends_on:
      - nova-verifier-backend
    restart: unless-stopped
    networks:
      - education-trust-network

networks:
  education-trust-network:
    driver: bridge
    name: education-trust-network

volumes:
  verifier-backend-data:
  verifier-backend-keys:
