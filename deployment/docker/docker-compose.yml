networks:
  certizen-network:
    driver: bridge

volumes:
  hk-tr-db-data:
    name: certizen-hk-tr-db-data
  macau-tr-db-data:
    name: certizen-macau-tr-db-data
  sg-tr-db-data:
    name: certizen-sg-tr-db-data
