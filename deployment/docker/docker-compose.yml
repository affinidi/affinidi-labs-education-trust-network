  # Hong Kong University Issuance Service
  hk-university-issuer:
    build:
      context: ./university-issuance-service/code
      dockerfile: Dockerfile
    container_name: certizen-hk-university-issuer
    ports:
      - "3000:3000"
    env_file:
      - ./university-issuance-service/instances/hk-university/.env
    volumes:
      - ./domain-setup/code/domains.json:/app/domains.json:ro
      - ./university-issuance-service/instances/hk-university/data:/app/data
      - ./university-issuance-service/instances/hk-university/keys:/app/keys
    networks:
      - certizen-network
    restart: unless-stopped

  # Macau University Issuance Service
  macau-university-issuer:
    build:
      context: ./university-issuance-service/code
      dockerfile: Dockerfile
    container_name: certizen-macau-university-issuer
    ports:
      - "3001:3001"
    env_file:
      - ./university-issuance-service/instances/macau-university/.env
    volumes:
      - ./domain-setup/code/domains.json:/app/domains.json:ro
      - ./university-issuance-service/instances/macau-university/data:/app/data
      - ./university-issuance-service/instances/macau-university/keys:/app/keys
    networks:
      - certizen-network
    restart: unless-stopped

